{% extends "base.html" %}

{% block title %}所有标签 · {{ config.siteName }}{% endblock %}
{% block body_class %}page-tags{% endblock %}

{% block main %}
<div class="index-content">
  <h1 class="post-title">所有标签</h1>
</div>

<div class="tags-cloud">
  {% for tag in tags %}
    <a href="{{ tag.link }}" class="tag-item">
      {{ tag.name }} <span class="tag-count">({{ tag.count }})</span>
    </a>
  {% endfor %}
</div>
{% endblock %}
