{% if pagination %}
<div class="pagination">
  {# 上一页 #}
  <div class="pagination-item{% if not pagination.prev %} disabled{% endif %}">
    {% if pagination.prev %}
      <a href="{{ pagination.prev }}">← 上一页</a>
    {% else %}
      <span>← 上一页</span>
    {% endif %}
  </div>

  {# 页码信息 #}
  {% if pagination.current and pagination.total %}
  <div class="pagination-item pagination-current">
    <span>{{ pagination.current }} / {{ pagination.total }}</span>
  </div>
  {% endif %}

  {# 下一页 #}
  <div class="pagination-item{% if not pagination.next %} disabled{% endif %}">
    {% if pagination.next %}
      <a href="{{ pagination.next }}">下一页 →</a>
    {% else %}
      <span>下一页 →</span>
    {% endif %}
  </div>
</div>
{% endif %}
